<svg xmlns="http://www.w3.org/2000/svg"
     width="600" height="360" viewBox="0 0 600 360">

  <rect width="600" height="360" fill="#0d0d1a" rx="8"/>

  <g stroke="#00d4ff" stroke-width="2.5"
     fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ── Vcc: terminal superior izquierdo ── -->
    <line x1="90" y1="84"  x2="90" y2="118"/>   <!-- stub bajando desde Vcc -->

    <!-- Hilo Vcc → Resistencia -->
    <line x1="90"  y1="118" x2="138" y2="118"/>

    <!-- Resistencia R (rectángulo horizontal) -->
    <rect x="138" y="102" width="100" height="32" rx="5"/>

    <!-- Hilo R → LED (ánodo) -->
    <line x1="238" y1="118" x2="284" y2="118"/>

    <!-- ── Símbolo LED ──
         Triángulo: ánodo (izq) → cátodo (der), corriente fluye →
         Vértices: punta en (321,118), base izq en (284,101) y (284,135) -->
    <polygon points="284,101 284,135 321,118" fill="#0a1520"/>

    <!-- Barra del cátodo -->
    <line x1="321" y1="101" x2="321" y2="135"/>

    <!-- ── Rayos de luz (flechas saliendo del cátodo) ── -->
    <!-- Rayo 1 -->
    <line x1="330" y1="107" x2="348" y2="88"/>
    <line x1="348" y1="88"  x2="343" y2="88"/>    <!-- punta flecha horizontal -->
    <line x1="348" y1="88"  x2="348" y2="94"/>    <!-- punta flecha vertical -->

    <!-- Rayo 2 -->
    <line x1="330" y1="120" x2="350" y2="104"/>
    <line x1="350" y1="104" x2="345" y2="104"/>
    <line x1="350" y1="104" x2="350" y2="110"/>

    <!-- Hilo cátodo → esquina inferior derecha -->
    <line x1="321" y1="118" x2="480" y2="118"/>
    <line x1="480" y1="118" x2="480" y2="264"/>

    <!-- Bus GND horizontal -->
    <line x1="90"  y1="264" x2="480" y2="264"/>

    <!-- Bajada al símbolo GND (lado izquierdo) -->
    <line x1="90"  y1="264" x2="90"  y2="278"/>

    <!-- ── Símbolo GND: 3 barras decrecientes ── -->
    <line x1="62"  y1="278" x2="118" y2="278"/>   <!-- barra 1 – 56 px -->
    <line x1="72"  y1="292" x2="108" y2="292"/>   <!-- barra 2 – 36 px -->
    <line x1="82"  y1="306" x2="98"  y2="306"/>   <!-- barra 3 – 16 px -->

  </g>

  <!-- ── Etiquetas ── -->

  <!-- Vcc (arriba del stub) -->
  <text x="90" y="76" text-anchor="middle"
        fill="#00d4ff" font-family="monospace" font-size="16" font-weight="bold">Vcc</text>

  <!-- R (encima del rectángulo) -->
  <text x="188" y="96" text-anchor="middle"
        fill="#00d4ff" font-family="monospace" font-size="15" font-weight="bold">R</text>

  <!-- Vf (debajo del LED) -->
  <text x="302" y="152" text-anchor="middle"
        fill="#00d4ff" font-family="monospace" font-size="13">Vf</text>

  <!-- If (flecha de corriente en hilo superior) -->
  <text x="400" y="110"
        fill="#00d4ff" font-family="monospace" font-size="13">If ──→</text>

  <!-- Fórmula al pie -->
  <text x="300" y="342" text-anchor="middle"
        fill="#5a7898" font-family="monospace" font-size="15">
    R = (Vcc − Vf) / If
  </text>

  <!-- Unidades -->
  <text x="300" y="358" text-anchor="middle"
        fill="#3a5570" font-family="monospace" font-size="12">
    R(Ω)  ·  Vf(V)  ·  If(A)  ·  P = If² × R
  </text>
</svg>
